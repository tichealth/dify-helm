apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        ready
        health {
          lameduck 5s
        }
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
          ttl 30
        }
        prometheus :9153
        # Azure DNS (168.63.129.16) MUST be first so Private DNS zones (e.g.
        # *.privatelink.postgres.database.azure.com) resolve. Without it,
        # in-cluster workloads lose access to private-link Postgres.
        # Public resolvers are kept as fallback for general internet lookups
        # (e.g. cert-manager ACME helpers).
        forward . 168.63.129.16 8.8.8.8 1.1.1.1 {
          max_concurrent 1000
        }
        cache 30
        loop
        reload
        loadbalance
        import custom/*.override
        template ANY ANY internal.cloudapp.net {
          match "^(?:[^.]+\.){4,}internal\.cloudapp\.net\.$"
          rcode NXDOMAIN
          fallthrough
        }
        template ANY ANY reddog.microsoft.com {
          rcode NXDOMAIN
        }
    }

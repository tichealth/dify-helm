name: Deploy or teardown Dify on AKS

on:
  workflow_dispatch:
    inputs:
      enabled:
        description: 'Enable workflow run (leave unchecked to disable)'
        required: true
        type: boolean
        default: false
      action:
        description: 'Deploy or teardown'
        required: true
        type: choice
        options:
          - deploy
          - teardown
        default: 'deploy'
      deploy_mode:
        description: 'Deploy scope (when action=deploy)'
        required: true
        type: choice
        options:
          - all
          - app
          - db
        default: 'all'
      environment:
        description: 'Environment (tfvars)'
        required: true
        type: choice
        options:
          - dev
          - test
          - lite-prod
          - prod-full
        default: 'dev'

env:
  TF_DIR: deployments/aks

jobs:
  deploy-or-teardown:
    if: inputs.enabled
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: "${{ (inputs.environment == 'lite-prod' || inputs.environment == 'prod-full') && 'prod' || inputs.environment }}"
    outputs:
      lb_ip: ${{ steps.dns.outputs.lb_ip }}
      ingress_host: ${{ steps.dns.outputs.ingress_host }}
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight (ensure env vars/secrets set)
        run: |
          set -euo pipefail

          [ -n "${{ secrets.AZURE_CREDENTIALS }}" ] || (echo "Missing GitHub Environment secret: AZURE_CREDENTIALS (JSON with clientId, clientSecret, tenantId, subscriptionId)" && exit 1)

          [ -n "${{ vars.AZURE_BLOB_ACCOUNT_NAME }}" ] || (echo "Missing GitHub Environment variable: AZURE_BLOB_ACCOUNT_NAME" && exit 1)
          [ -n "${{ vars.BACKEND_RESOURCE_GROUP }}" ] || (echo "Missing GitHub Environment variable: BACKEND_RESOURCE_GROUP" && exit 1)
          [ -n "${{ secrets.AZURE_BLOB_ACCOUNT_KEY }}" ] || (echo "Missing GitHub Environment secret: AZURE_BLOB_ACCOUNT_KEY" && exit 1)

          [ -n "${{ secrets.DIFY_SECRET_KEY }}" ] || (echo "Missing GitHub Environment secret: DIFY_SECRET_KEY" && exit 1)
          [ -n "${{ secrets.POSTGRESQL_PASSWORD }}" ] || (echo "Missing GitHub Environment secret: POSTGRESQL_PASSWORD" && exit 1)
          [ -n "${{ secrets.REDIS_PASSWORD }}" ] || (echo "Missing GitHub Environment secret: REDIS_PASSWORD" && exit 1)
          [ -n "${{ secrets.QDRANT_API_KEY }}" ] || (echo "Missing GitHub Environment secret: QDRANT_API_KEY" && exit 1)

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set ARM_* for Terraform provider
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          echo "ARM_CLIENT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r .clientId)" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r .tenantId)" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=$(echo "$AZURE_CREDENTIALS" | jq -r .subscriptionId)" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=$(echo "$AZURE_CREDENTIALS" | jq -r .clientSecret)" >> $GITHUB_ENV

      - name: Copy environment tfvars
        run: |
          cp "environments/${{ inputs.environment }}.tfvars" terraform.tfvars
          echo "Using environment: ${{ inputs.environment }}"

      - name: Set Terraform variables from GitHub Variables and Secrets
        run: |
          echo "TF_VAR_azure_blob_account_name=${{ vars.AZURE_BLOB_ACCOUNT_NAME }}" >> $GITHUB_ENV
          echo "TF_VAR_azure_blob_account_key=${{ secrets.AZURE_BLOB_ACCOUNT_KEY }}" >> $GITHUB_ENV
          echo "TF_VAR_azure_blob_account_url=https://${{ vars.AZURE_BLOB_ACCOUNT_NAME }}.blob.core.windows.net" >> $GITHUB_ENV
          echo "TF_VAR_dify_secret_key=${{ secrets.DIFY_SECRET_KEY }}" >> $GITHUB_ENV
          echo "TF_VAR_postgresql_password=${{ secrets.POSTGRESQL_PASSWORD }}" >> $GITHUB_ENV
          echo "TF_VAR_redis_password=${{ secrets.REDIS_PASSWORD }}" >> $GITHUB_ENV
          echo "TF_VAR_qdrant_api_key=${{ secrets.QDRANT_API_KEY }}" >> $GITHUB_ENV

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
          terraform_wrapper: false

      - name: Write Terraform backend config (remote state)
        run: |
          cat > backend.azurerm.tfvars <<'EOF'
          resource_group_name  = "${{ vars.BACKEND_RESOURCE_GROUP }}"
          storage_account_name = "${{ vars.AZURE_BLOB_ACCOUNT_NAME }}"
          container_name       = "tfstate"
          key                  = "${{ (inputs.environment == 'lite-prod' || inputs.environment == 'prod-full') && 'prod.terraform.tfstate' || format('{0}.terraform.tfstate', inputs.environment) }}"
          access_key           = "${{ secrets.AZURE_BLOB_ACCOUNT_KEY }}"
          EOF
          chmod 600 backend.azurerm.tfvars

      - name: Install Azure CLI, kubectl, Helm
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az version
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=${{ vars.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.AZURE_BLOB_ACCOUNT_NAME }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ (inputs.environment == 'lite-prod' || inputs.environment == 'prod-full') && 'prod.terraform.tfstate' || format('{0}.terraform.tfstate', inputs.environment) }}" \
            -backend-config="access_key=${{ secrets.AZURE_BLOB_ACCOUNT_KEY }}"

      - name: Deploy (all)
        if: inputs.action == 'deploy' && inputs.deploy_mode == 'all'
        timeout-minutes: 60
        run: |
          chmod +x deploy.sh
          ./deploy.sh --all --auto-approve

      - name: Deploy (app only)
        if: inputs.action == 'deploy' && inputs.deploy_mode == 'app'
        timeout-minutes: 60
        run: |
          chmod +x deploy.sh
          ./deploy.sh --app --auto-approve

      - name: Output DNS configuration (IP for first-time setup)
        id: dns
        if: inputs.action == 'deploy' && (inputs.deploy_mode == 'all' || inputs.deploy_mode == 'app')
        run: |
          CLUSTER=$(terraform output -raw aks_cluster_name 2>/dev/null || echo "")
          RG=$(terraform output -raw resource_group_name 2>/dev/null || echo "")
          if [ -z "$CLUSTER" ] || [ -z "$RG" ]; then
            echo "Could not get cluster/resource group (Terraform state missing?). Skip DNS step."
            exit 0
          fi
          az aks get-credentials --resource-group "$RG" --name "$CLUSTER" --overwrite-existing
          LB_IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
          if [ -z "$LB_IP" ]; then
            LB_IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          fi
          case "${{ inputs.environment }}" in
            lite-prod|prod-full) INGRESS_HOST="dify-prod.tichealth.com.au" ;;
            dev)                 INGRESS_HOST="dify-dev.tichealth.com.au" ;;
            test)                INGRESS_HOST="dify-test.tichealth.com.au" ;;
            *)                  INGRESS_HOST="dify-${{ inputs.environment }}.tichealth.com.au" ;;
          esac
          echo ""
          echo "=============================================="
          echo "DNS: Point your domain to this address"
          echo "=============================================="
          echo "Ingress host: $INGRESS_HOST"
          echo "IP/Hostname:  ${LB_IP:-<pending>}"
          echo ""
          echo "Create DNS record:  $INGRESS_HOST  ->  ${LB_IP:-<IP from kubectl get svc -n ingress-nginx>}"
          echo "=============================================="
          echo ""
          echo "lb_ip=$LB_IP" >> $GITHUB_OUTPUT
          echo "ingress_host=$INGRESS_HOST" >> $GITHUB_OUTPUT

      - name: Deploy (db only)
        if: inputs.action == 'deploy' && inputs.deploy_mode == 'db'
        timeout-minutes: 60
        run: |
          chmod +x deploy.sh
          ./deploy.sh --db --auto-approve

      - name: Get AKS credentials (for teardown)
        if: inputs.action == 'teardown'
        run: |
          CLUSTER=$(terraform output -raw aks_cluster_name)
          RG=$(terraform output -raw resource_group_name)
          az aks get-credentials --resource-group "$RG" --name "$CLUSTER" --overwrite-existing

      - name: Uninstall Helm releases (teardown)
        if: inputs.action == 'teardown'
        run: |
          helm uninstall dify -n dify 2>/dev/null || true
          helm uninstall ingress-nginx -n ingress-nginx 2>/dev/null || true
          helm uninstall cert-manager -n cert-manager 2>/dev/null || true

      - name: Terraform Destroy (teardown)
        if: inputs.action == 'teardown'
        run: terraform destroy -auto-approve

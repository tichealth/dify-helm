name: Deploy or teardown Dify on AKS

# Two-job flow: plan -> (Environment approval) -> apply.
# Required reviewers must be configured on the GitHub Environment (`dev`/`test`/`prod`)
# for the apply gate to actually pause. See deployments/aks/GITHUB_ACTIONS_SECRETS.md.

on:
  workflow_dispatch:
    inputs:
      enabled:
        description: 'Enable workflow run (leave unchecked to disable)'
        required: true
        type: boolean
        default: false
      action:
        description: 'Deploy, teardown, or force-unlock stale Terraform state'
        required: true
        type: choice
        options: [deploy, teardown, force-unlock]
        default: 'deploy'
      lock_id:
        description: 'Terraform lock ID (required when action=force-unlock; copy from the state lock error)'
        required: false
        type: string
        default: ''
      deploy_mode:
        description: 'Deploy scope (when action=deploy)'
        required: true
        type: choice
        options: [all, app, db]
        default: 'all'
      environment:
        description: 'Environment (tfvars)'
        required: true
        type: choice
        options: [dev, test, lite-prod, prod-full]
        default: 'dev'

env:
  TF_DIR: deployments/aks

jobs:
  force-unlock:
    if: inputs.enabled && inputs.action == 'force-unlock'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: "${{ (inputs.environment == 'lite-prod' || inputs.environment == 'prod-full') && 'prod' || inputs.environment }}"
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-aks
        with:
          environment: ${{ inputs.environment }}
          azure_credentials: ${{ secrets.AZURE_CREDENTIALS }}
          azure_blob_account_name: ${{ vars.AZURE_BLOB_ACCOUNT_NAME }}
          azure_blob_account_key: ${{ secrets.AZURE_BLOB_ACCOUNT_KEY }}
          backend_resource_group: ${{ vars.BACKEND_RESOURCE_GROUP }}
          dify_secret_key: ${{ secrets.DIFY_SECRET_KEY }}
          postgresql_password: ${{ secrets.POSTGRESQL_PASSWORD }}
          redis_password: ${{ secrets.REDIS_PASSWORD }}
          qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}
          phoenix_otlp_endpoint: ${{ vars.PHOENIX_OTLP_ENDPOINT }}

      - name: Validate lock ID
        run: |
          LOCK_ID='${{ inputs.lock_id }}'
          if [ -z "$LOCK_ID" ]; then
            echo "lock_id is required when action=force-unlock."
            echo "Copy the ID from the Terraform state lock error (Lock Info -> ID)."
            exit 1
          fi
          if ! echo "$LOCK_ID" | grep -qE '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
            echo "lock_id does not look like a Terraform lock UUID: $LOCK_ID"
            exit 1
          fi
          echo "LOCK_ID=$LOCK_ID" >> "$GITHUB_ENV"

      - name: Force-unlock Terraform state
        run: |
          echo "Unlocking state for environment: ${{ inputs.environment }}"
          terraform force-unlock -force "$LOCK_ID"
          echo "State unlocked. Re-run with action=deploy to continue."

  plan:
    if: inputs.enabled && inputs.action != 'force-unlock'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: "${{ (inputs.environment == 'lite-prod' || inputs.environment == 'prod-full') && 'prod' || inputs.environment }}"
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-aks
        with:
          environment: ${{ inputs.environment }}
          azure_credentials: ${{ secrets.AZURE_CREDENTIALS }}
          azure_blob_account_name: ${{ vars.AZURE_BLOB_ACCOUNT_NAME }}
          azure_blob_account_key: ${{ secrets.AZURE_BLOB_ACCOUNT_KEY }}
          backend_resource_group: ${{ vars.BACKEND_RESOURCE_GROUP }}
          dify_secret_key: ${{ secrets.DIFY_SECRET_KEY }}
          postgresql_password: ${{ secrets.POSTGRESQL_PASSWORD }}
          redis_password: ${{ secrets.REDIS_PASSWORD }}
          qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}
          phoenix_otlp_endpoint: ${{ vars.PHOENIX_OTLP_ENDPOINT }}

      - name: Plan deploy
        if: inputs.action == 'deploy'
        timeout-minutes: 60
        run: |
          chmod +x deploy.sh
          ./deploy.sh --${{ inputs.deploy_mode }} --plan-stage

      - name: Plan teardown
        if: inputs.action == 'teardown'
        run: terraform plan -destroy -out=tfplan 2>&1 | tee terraform-plan-destroy.log

      - name: Upload plan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "${{ github.run_id }}-${{ github.run_attempt }}-plan"
          path: |
            ${{ env.TF_DIR }}/tfplan
            ${{ env.TF_DIR }}/terraform-plan*.log
            ${{ env.TF_DIR }}/helm-diff*.log

  apply:
    if: inputs.enabled && inputs.action != 'force-unlock'
    needs: [plan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Same environment as plan; this is the gate where Required reviewers pauses the run.
    environment: "${{ (inputs.environment == 'lite-prod' || inputs.environment == 'prod-full') && 'prod' || inputs.environment }}"
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-aks
        with:
          environment: ${{ inputs.environment }}
          azure_credentials: ${{ secrets.AZURE_CREDENTIALS }}
          azure_blob_account_name: ${{ vars.AZURE_BLOB_ACCOUNT_NAME }}
          azure_blob_account_key: ${{ secrets.AZURE_BLOB_ACCOUNT_KEY }}
          backend_resource_group: ${{ vars.BACKEND_RESOURCE_GROUP }}
          dify_secret_key: ${{ secrets.DIFY_SECRET_KEY }}
          postgresql_password: ${{ secrets.POSTGRESQL_PASSWORD }}
          redis_password: ${{ secrets.REDIS_PASSWORD }}
          qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}
          phoenix_otlp_endpoint: ${{ vars.PHOENIX_OTLP_ENDPOINT }}

      - name: Download plan artifacts
        uses: actions/download-artifact@v4
        with:
          name: "${{ github.run_id }}-${{ github.run_attempt }}-plan"
          path: ${{ env.TF_DIR }}

      - name: Apply deploy
        if: inputs.action == 'deploy'
        timeout-minutes: 60
        run: |
          chmod +x deploy.sh
          ./deploy.sh --${{ inputs.deploy_mode }} --apply-stage

      - name: Output DNS configuration
        if: inputs.action == 'deploy' && inputs.deploy_mode != 'db'
        run: |
          CLUSTER=$(terraform output -raw aks_cluster_name 2>/dev/null || echo "")
          RG=$(terraform output -raw resource_group_name 2>/dev/null || echo "")
          [ -z "$CLUSTER" ] || [ -z "$RG" ] && { echo "Could not get cluster/RG from TF state; skipping DNS step."; exit 0; }
          az aks get-credentials --resource-group "$RG" --name "$CLUSTER" --overwrite-existing
          LB_IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          [ -z "$LB_IP" ] && LB_IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
          echo "=============================================="
          echo "DNS: ${DIFY_INGRESS_HOST}  ->  ${LB_IP:-<pending>}"
          echo "=============================================="

      - name: Apply teardown
        if: inputs.action == 'teardown'
        timeout-minutes: 60
        run: |
          CLUSTER=$(terraform output -raw aks_cluster_name 2>/dev/null || echo "")
          RG=$(terraform output -raw resource_group_name 2>/dev/null || echo "")
          if [ -n "$CLUSTER" ] && [ -n "$RG" ]; then
            az aks get-credentials --resource-group "$RG" --name "$CLUSTER" --overwrite-existing
            helm uninstall dify -n dify 2>/dev/null || true
            helm uninstall ingress-nginx -n ingress-nginx 2>/dev/null || true
            helm uninstall cert-manager -n cert-manager 2>/dev/null || true
          fi
          terraform apply -auto-approve tfplan

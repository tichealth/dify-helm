name: Setup AKS deploy
description: Shared setup for plan/apply jobs (Azure login, TF vars, kubectl/helm install, terraform init)

inputs:
  environment:
    description: Logical environment input (dev/test/lite-prod/prod-full)
    required: true
  azure_credentials:
    description: Azure SP JSON
    required: true
  azure_blob_account_name:
    required: true
  azure_blob_account_key:
    required: true
  backend_resource_group:
    required: true
  dify_secret_key:
    required: true
  postgresql_password:
    required: true
  redis_password:
    required: true
  qdrant_api_key:
    required: true
  phoenix_otlp_endpoint:
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Preflight (ensure env vars/secrets set)
      shell: bash
      run: |
        set -euo pipefail
        [ -n "${{ inputs.azure_credentials }}"      ] || { echo "Missing AZURE_CREDENTIALS"; exit 1; }
        [ -n "${{ inputs.azure_blob_account_name }}" ] || { echo "Missing AZURE_BLOB_ACCOUNT_NAME"; exit 1; }
        [ -n "${{ inputs.backend_resource_group }}" ] || { echo "Missing BACKEND_RESOURCE_GROUP"; exit 1; }
        [ -n "${{ inputs.azure_blob_account_key }}" ] || { echo "Missing AZURE_BLOB_ACCOUNT_KEY"; exit 1; }
        [ -n "${{ inputs.dify_secret_key }}"        ] || { echo "Missing DIFY_SECRET_KEY"; exit 1; }
        [ -n "${{ inputs.postgresql_password }}"    ] || { echo "Missing POSTGRESQL_PASSWORD"; exit 1; }
        [ -n "${{ inputs.redis_password }}"         ] || { echo "Missing REDIS_PASSWORD"; exit 1; }
        [ -n "${{ inputs.qdrant_api_key }}"         ] || { echo "Missing QDRANT_API_KEY"; exit 1; }

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ inputs.azure_credentials }}

    - name: Set ARM_* + TF_VAR_* + ingress host
      shell: bash
      env:
        AZURE_CREDENTIALS: ${{ inputs.azure_credentials }}
      run: |
        echo "ARM_CLIENT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r .clientId)"             >> "$GITHUB_ENV"
        echo "ARM_TENANT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r .tenantId)"             >> "$GITHUB_ENV"
        echo "ARM_SUBSCRIPTION_ID=$(echo "$AZURE_CREDENTIALS" | jq -r .subscriptionId)" >> "$GITHUB_ENV"
        echo "ARM_CLIENT_SECRET=$(echo "$AZURE_CREDENTIALS" | jq -r .clientSecret)"     >> "$GITHUB_ENV"

        echo "TF_VAR_azure_blob_account_name=${{ inputs.azure_blob_account_name }}"     >> "$GITHUB_ENV"
        echo "TF_VAR_azure_blob_account_key=${{ inputs.azure_blob_account_key }}"       >> "$GITHUB_ENV"
        echo "TF_VAR_azure_blob_account_url=https://${{ inputs.azure_blob_account_name }}.blob.core.windows.net" >> "$GITHUB_ENV"
        echo "TF_VAR_dify_secret_key=${{ inputs.dify_secret_key }}"                     >> "$GITHUB_ENV"
        echo "TF_VAR_postgresql_password=${{ inputs.postgresql_password }}"             >> "$GITHUB_ENV"
        echo "TF_VAR_redis_password=${{ inputs.redis_password }}"                       >> "$GITHUB_ENV"
        echo "TF_VAR_qdrant_api_key=${{ inputs.qdrant_api_key }}"                       >> "$GITHUB_ENV"
        echo "PHOENIX_OTLP_ENDPOINT=${{ inputs.phoenix_otlp_endpoint }}"                >> "$GITHUB_ENV"

        case "${{ inputs.environment }}" in
          lite-prod|prod-full) echo "DIFY_INGRESS_HOST=dify-prod.tichealth.com.au" >> "$GITHUB_ENV" ;;
          dev)                 echo "DIFY_INGRESS_HOST=dify-dev.tichealth.com.au"  >> "$GITHUB_ENV" ;;
          test)                echo "DIFY_INGRESS_HOST=dify-test.tichealth.com.au" >> "$GITHUB_ENV" ;;
          *)                   echo "DIFY_INGRESS_HOST=dify-${{ inputs.environment }}.tichealth.com.au" >> "$GITHUB_ENV" ;;
        esac

    - name: Copy environment tfvars
      shell: bash
      working-directory: deployments/aks
      run: |
        cp "environments/${{ inputs.environment }}.tfvars" terraform.tfvars
        echo "Using environment: ${{ inputs.environment }}"

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.10.5"
        terraform_wrapper: false

    - name: Install Azure CLI, kubectl, Helm
      shell: bash
      run: |
        curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
        curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl && sudo mv kubectl /usr/local/bin/
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm plugin install https://github.com/databus23/helm-diff || true
        az version; helm version; kubectl version --client

    - name: Terraform Init
      shell: bash
      working-directory: deployments/aks
      run: |
        KEY="${{ (inputs.environment == 'lite-prod' || inputs.environment == 'prod-full') && 'prod.terraform.tfstate' || format('{0}.terraform.tfstate', inputs.environment) }}"
        terraform init -reconfigure \
          -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
          -backend-config="storage_account_name=${{ inputs.azure_blob_account_name }}" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=${KEY}" \
          -backend-config="access_key=${{ inputs.azure_blob_account_key }}"
